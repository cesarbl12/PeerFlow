<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>PeerFlow — Revisión por Pares</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">⬡</span>
          <span class="logo-text">PeerFlow</span>
          <span class="sync-badge" id="syncBadge" title="Estado de sincronización">
            <span class="sync-dot offline"></span>
            <span class="sync-label" id="syncLabel">Offline</span>
          </span>
        </div>
        <nav class="main-nav">
          <button class="nav-btn active" data-view="dashboard">Tablero</button>
          <button class="nav-btn" data-view="article-form">+ Artículo</button>
          <button class="nav-btn" data-view="reviewers">Revisores</button>
        </nav>
        <div class="header-actions">
          <button id="syncBtn" class="sync-btn" title="Sincronizar con servidor">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Sincronizar
          </button>
        </div>
      </div>
    </header>

    <!-- Toast notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Main content area -->
    <main id="viewContainer" class="view-container"></main>

    <!-- Offline indicator -->
    <div id="offlineBar" class="offline-bar hidden">
      <span>⚡ Modo offline — los cambios se guardan localmente</span>
    </div>
  </div>

  <!-- View Templates -->
  <template id="tpl-dashboard">
    <div class="view dashboard-view">
      <div class="view-header">
        <h1>Tablero de Artículos</h1>
        <div class="view-actions">
          <select id="filterStatus" class="filter-select">
            <option value="">Todos los estados</option>
            <option value="received">Recibido</option>
            <option value="in-review">En revisión</option>
            <option value="comments-ready">Comentarios listos</option>
          </select>
          <button class="btn-demo" id="loadDemoBtn">Cargar datos demo</button>
        </div>
      </div>
      <div id="articleGrid" class="article-grid">
        <div class="loading-state">Cargando artículos...</div>
      </div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📄</div>
        <p>No hay artículos todavía.</p>
        <button class="btn-primary" data-nav="article-form">Crear primer artículo</button>
      </div>
    </div>
  </template>

  <template id="tpl-article-form">
    <div class="view form-view">
      <div class="view-header">
        <h1 id="formTitle">Nuevo Artículo</h1>
        <button class="btn-back" data-nav="dashboard">← Volver</button>
      </div>
      <form id="articleForm" class="form-card">
        <input type="hidden" id="articleId" />
        <div class="form-group">
          <label for="artTitle">Título del artículo <span class="req">*</span></label>
          <input type="text" id="artTitle" placeholder="Ej: Redes Neuronales Convolucionales para detección de anomalías..." required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="artAuthor">Autor principal <span class="req">*</span></label>
            <input type="text" id="artAuthor" placeholder="Nombre completo" required />
          </div>
          <div class="form-group">
            <label for="artEmail">Email del autor</label>
            <input type="email" id="artEmail" placeholder="autor@universidad.edu" />
          </div>
        </div>
        <div class="form-group">
          <label for="artAbstract">Resumen / Abstract</label>
          <textarea id="artAbstract" rows="4" placeholder="Breve descripción del artículo..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="artKeywords">Palabras clave</label>
            <input type="text" id="artKeywords" placeholder="IA, redes neuronales, deep learning" />
          </div>
          <div class="form-group">
            <label for="artDate">Fecha de recepción</label>
            <input type="date" id="artDate" />
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" data-nav="dashboard">Cancelar</button>
          <button type="submit" class="btn-primary" id="saveArticleBtn">Guardar artículo</button>
        </div>
      </form>
    </div>
  </template>

  <template id="tpl-assign-view">
    <div class="view assign-view">
      <div class="view-header">
        <h1>Asignar Revisores</h1>
        <button class="btn-back" data-nav="dashboard">← Volver</button>
      </div>
      <div class="article-summary-card" id="assignArticleSummary"></div>
      <form id="assignForm" class="form-card">
        <input type="hidden" id="assignArticleId" />
        <div class="form-group">
          <label>Seleccionar revisores <span class="req">*</span> (mín. 2, máx. 3)</label>
          <div id="reviewerCheckboxes" class="reviewer-grid"></div>
        </div>
        <div class="form-group">
          <label for="assignDueDate">Fecha límite <span class="req">*</span></label>
          <input type="date" id="assignDueDate" />
          <span class="field-hint">Por defecto: 21 días desde hoy</span>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" data-nav="dashboard">Cancelar</button>
          <button type="submit" class="btn-primary">Confirmar asignación</button>
        </div>
      </form>
    </div>
  </template>

  <template id="tpl-review-form">
    <div class="view review-view">
      <div class="view-header">
        <h1>Formulario de Revisión</h1>
        <div class="header-badges">
          <span class="badge badge-draft" id="reviewStatusBadge">Borrador</span>
          <span class="offline-save-hint">💾 Auto-guardado offline</span>
        </div>
        <button class="btn-back" data-nav="dashboard">← Volver</button>
      </div>
      <div class="article-summary-card" id="reviewArticleSummary"></div>
      <form id="reviewForm" class="form-card">
        <input type="hidden" id="reviewId" />
        <input type="hidden" id="reviewArticleId" />
        <input type="hidden" id="reviewerId" />
        <div class="form-group">
          <label for="reviewStrengths">Fortalezas del artículo <span class="req">*</span></label>
          <textarea id="reviewStrengths" rows="4" placeholder="Describa los puntos fuertes del artículo..."></textarea>
        </div>
        <div class="form-group">
          <label for="reviewWeaknesses">Debilidades / Áreas de mejora <span class="req">*</span></label>
          <textarea id="reviewWeaknesses" rows="4" placeholder="Señale aspectos que necesitan mejora..."></textarea>
        </div>
        <div class="form-group">
          <label for="reviewComments">Comentarios adicionales para el autor</label>
          <textarea id="reviewComments" rows="4" placeholder="Observaciones, sugerencias, referencias..."></textarea>
        </div>
        <div class="form-group">
          <label>Recomendación final <span class="req">*</span></label>
          <div class="recommendation-options">
            <label class="radio-card">
              <input type="radio" name="recommendation" value="accept" />
              <span class="radio-label accept">✓ Aceptar</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="recommendation" value="minor-revisions" />
              <span class="radio-label minor">⟳ Revisiones menores</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="recommendation" value="major-revisions" />
              <span class="radio-label major">⚠ Revisiones mayores</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="recommendation" value="reject" />
              <span class="radio-label reject">✗ Rechazar</span>
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="saveDraftBtn" class="btn-secondary">💾 Guardar borrador</button>
          <button type="submit" id="submitReviewBtn" class="btn-primary">Enviar revisión →</button>
        </div>
      </form>
    </div>
  </template>

  <template id="tpl-author-status">
    <div class="view author-view">
      <div class="view-header">
        <h1>Estado del artículo</h1>
        <button class="btn-back" data-nav="dashboard">← Volver</button>
      </div>
      <div id="authorArticleDetail" class="author-detail"></div>
      <div id="authorReviewsList" class="reviews-list"></div>
    </div>
  </template>

  <template id="tpl-reviewers">
    <div class="view reviewers-view">
      <div class="view-header">
        <h1>Gestión de Revisores</h1>
      </div>
      <form id="reviewerForm" class="form-card compact">
        <h3>Agregar revisor</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="revName">Nombre <span class="req">*</span></label>
            <input type="text" id="revName" placeholder="Dr. Juan García" required />
          </div>
          <div class="form-group">
            <label for="revEmail">Email <span class="req">*</span></label>
            <input type="email" id="revEmail" placeholder="revisor@universidad.edu" required />
          </div>
          <div class="form-group">
            <label for="revSpecialty">Especialidad</label>
            <input type="text" id="revSpecialty" placeholder="Inteligencia Artificial, Redes..." />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Agregar revisor</button>
        </div>
      </form>
      <div id="reviewersList" class="reviewers-list-container"></div>
    </div>
  </template>

  <!-- Sync Queue Panel -->
  <div id="syncPanel" class="sync-panel hidden">
    <div class="sync-panel-header">
      <h3>Cola de sincronización</h3>
      <button id="closeSyncPanel">×</button>
    </div>
    <div id="syncQueueList" class="sync-queue-list"></div>
    <div class="sync-panel-actions">
      <button id="forceSyncBtn" class="btn-primary">Sincronizar ahora</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
